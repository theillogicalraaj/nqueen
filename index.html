<!DOCTYPE html>
<html>
<head>
<title>Legendary War Queens - Final Stable</title>
<style>
body{margin:0;overflow:hidden;background:#111;}
.panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:10px;
color:white;
font-family:sans-serif;
z-index:10;
}
input,button{
display:block;
margin-top:8px;
width:160px;
}
button{
background:#c9a227;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="panel">
<label>Board Size (N)</label>
<input type="number" id="size" value="8" min="4" max="12">
<label>Speed (ms)</label>
<input type="number" id="speed" value="400">
<button onclick="start()">Start War</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* ================= ENGINE SETUP ================= */

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* Resize */
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

/* Lights */
let light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(20,40,20);
light.castShadow = true;

let ambient = new THREE.AmbientLight(0xffffff,0.4);

/* ================= STATE ================= */

let N=8;
let square=2.5;
let offset=0;
let board=[];
let queenMeshes=[];
let solveId=0;

/* ================= UTIL ================= */

function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

/* ================= QUEEN ================= */

function createQueen(x,z){

let profile=[
new THREE.Vector2(0.7,0),
new THREE.Vector2(1,0.3),
new THREE.Vector2(0.6,1),
new THREE.Vector2(0.9,1.8),
new THREE.Vector2(0.5,2.5),
new THREE.Vector2(0.6,3.2),
new THREE.Vector2(0.3,4)
];

let geo=new THREE.LatheGeometry(profile,64);
let mat=new THREE.MeshStandardMaterial({
color:0xd4af37,
metalness:1,
roughness:0.25,
emissive:0x3a2d0b
});

let mesh=new THREE.Mesh(geo,mat);
mesh.scale.set(0.7,0.7,0.7);
mesh.position.set(x,0,z);
mesh.castShadow=true;

scene.add(mesh);
return mesh;
}

/* ================= BOARD ================= */

function createBoard(){

board=[];
queenMeshes=[];
offset=(N*square)/2 - square/2;

for(let r=0;r<N;r++){
board[r]=[];
queenMeshes[r]=[];

for(let c=0;c<N;c++){

let geo=new THREE.BoxGeometry(square,0.6,square);
let mat=new THREE.MeshStandardMaterial({
color:(r+c)%2?0x5c3a21:0xf5deb3
});

let sq=new THREE.Mesh(geo,mat);
sq.position.set(
c*square-offset,
0,
r*square-offset
);

sq.receiveShadow=true;
scene.add(sq);

board[r][c]=0;
queenMeshes[r][c]=null;
}
}
}

/* ================= ATTACK DETECTION ================= */

function getAttacker(r,c){

for(let i=0;i<r;i++)
if(board[i][c]) return [i,c];

for(let i=r,j=c;i>=0&&j>=0;i--,j--)
if(board[i][j]) return [i,j];

for(let i=r,j=c;i>=0&&j<N;i--,j++)
if(board[i][j]) return [i,j];

return null;
}

/* ================= EFFECTS ================= */

function spark(pos){
let geo=new THREE.SphereGeometry(0.6,16,16);
let mat=new THREE.MeshBasicMaterial({color:0xffd700});
let flash=new THREE.Mesh(geo,mat);
flash.position.copy(pos);
scene.add(flash);
setTimeout(()=>scene.remove(flash),150);
}

async function duel(attackerPos,defenderPos,currentId){

if(currentId!==solveId) return;

let attacker=queenMeshes[attackerPos[0]][attackerPos[1]];
let defender=queenMeshes[defenderPos[0]][defenderPos[1]];

if(!attacker||!defender) return;

spark(defender.position);

for(let i=0;i<12;i++){
if(currentId!==solveId) return;
defender.rotation.z+=0.1;
await sleep(20);
}

for(let i=0;i<15;i++){
if(currentId!==solveId) return;
defender.position.y-=0.15;
await sleep(20);
}

scene.remove(defender);
}

async function death(mesh,currentId){

for(let i=0;i<15;i++){
if(currentId!==solveId) return;
mesh.rotation.x+=0.1;
mesh.position.y-=0.15;
await sleep(20);
}

scene.remove(mesh);
}

/* ================= SOLVER ================= */

async function solve(r,currentId){

if(currentId!==solveId) return false;
if(r===N) return true;

for(let c=0;c<N;c++){

if(currentId!==solveId) return false;

let x=c*square-offset;
let z=r*square-offset;

let q=createQueen(x,z);
queenMeshes[r][c]=q;

await sleep(200);

if(currentId!==solveId){
scene.remove(q);
return false;
}

let attacker=getAttacker(r,c);

if(attacker){
await duel(attacker,[r,c],currentId);
queenMeshes[r][c]=null;
continue;
}

board[r][c]=1;

await sleep(document.getElementById("speed").value);

if(await solve(r+1,currentId)) return true;

await death(q,currentId);

board[r][c]=0;
queenMeshes[r][c]=null;
}

return false;
}

/* ================= START ================= */

async function start(){

solveId++;                // cancel previous solve
let currentId=solveId;

N=parseInt(document.getElementById("size").value);

/* FULL RESET */
while(scene.children.length>0){
scene.remove(scene.children[0]);
}

scene.add(light);
scene.add(ambient);

/* Auto scale camera */
camera.position.set(
0,
N*3,
N*4
);
camera.lookAt(0,0,0);

createBoard();

await solve(0,currentId);
}

/* ================= RENDER LOOP ================= */

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

createBoard();

</script>
</body>
</html>
